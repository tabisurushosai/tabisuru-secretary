name: Secretary Cron

on:
  schedule:
    - cron: '*/10 * * * *' # 10 min
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        working-directory: secretary
        run: pip install -r requirements.txt
      - name: Run secretary main
        working-directory: secretary
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CWS_CREDENTIALS_JSON: ${{ secrets.CWS_CREDENTIALS_JSON }}
          CWS_ITEM_IDS_JSON: ${{ secrets.CWS_ITEM_IDS_JSON }}
        run: python main.py
